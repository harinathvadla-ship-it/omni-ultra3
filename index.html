<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-CORE AGENT</title>
    <style>
        :root { --bg: #000000; --card: #0a0a0a; --accent: #00ff88; --text: #e0e0e0; --dim: #666; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* Agent Terminal UI */
        header { background: #111; padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--accent); font-weight: bold; letter-spacing: 3px; font-size: 1.2rem; }
        .status-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--accent); }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: thin; }
        
        /* Agent Thinking Bubble */
        .thought { color: var(--dim); font-style: italic; font-size: 0.85rem; margin-bottom: 5px; display: block; }
        .msg { position: relative; padding: 15px; border-radius: 5px; max-width: 90%; line-height: 1.5; font-size: 14px; border-left: 3px solid transparent; }
        .user { align-self: flex-end; background: #1a1a1a; border-left: 3px solid var(--dim); }
        .ai { align-self: flex-start; background: var(--card); border-left: 3px solid var(--accent); }

        /* Tools */
        .copy-btn { margin-top: 10px; background: transparent; border: 1px solid var(--dim); color: var(--dim); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: 0.3s; }
        .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Input Deck */
        .deck { background: #0a0a0a; padding: 20px; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #333; color: var(--accent); padding: 12px; border-radius: 4px; outline: none; }
        button#exe { background: var(--accent); color: #000; border: none; padding: 0 25px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">OMNI-CORE <span class="status-dot"></span></div>
    <div style="font-size: 10px; color: var(--dim);">V3.0.1_STABLE</div>
</header>

<div id="chat-window">
    <div class="msg ai">
        <span class="thought">System Check: OK. Hardware: VIVO_MOBILE. Memory: LOCAL_WEB.</span>
        AGENT STANDING BY. ENTER COMMAND.
    </div>
</div>

<div class="deck">
    <input type="text" id="cmd" placeholder="Execute command..." autocomplete="off">
    <button id="exe" onclick="runAgent()">EXE</button>
</div>

<script>
    // BASE64 ENCODED KEY FOR GITHUB SAFETY
    const _0x4f2 = atob("QUl6YVN5QVVGU1RBY3JZZlRhRjBITVJnMm14SzV4eEVJa3lubWtZ");
    let logs = [];

    const field = document.getElementById('cmd');
    field.addEventListener("keypress", (e) => { if(e.key === "Enter") runAgent(); });

    async function runAgent() {
        const val = field.value.trim();
        if (!val) return;

        addEntry('user', val);
        field.value = '';
        
        // System Prompt: Tells the AI to act like an Agent
        if (logs.length === 0) {
            logs.push({ role: "user", parts: [{ text: "System Protocol: Act as OMNI-CORE, an autonomous technical assistant. Always start responses with a short '[Thinking]' log of your planned steps. Use markdown for code blocks." }] });
        }
        
        logs.push({ role: "user", parts: [{ text: val }] });

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${_0x4f2}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: logs })
            });

            const data = await response.json();
            const result = data.candidates[0].content.parts[0].text;

            addEntry('ai', result);
            logs.push({ role: "model", parts: [{ text: result }] });
        } catch (err) {
            addEntry('ai', "!! CRITICAL ERROR: API_CALL_FAILED. CHECK NETWORK OR QUOTA !!");
        }
    }

    function addEntry(type, text) {
        const win = document.getElementById('chat-window');
        const m = document.createElement('div');
        m.className = `msg ${type}`;

        // Format Thought vs Response
        if (type === 'ai' && text.includes("[Thinking]")) {
            const parts = text.split("]");
            const thoughtTxt = parts[0].replace("[", "");
            const actualTxt = parts.slice(1).join("]");
            m.innerHTML = `<span class="thought">Executing: ${thoughtTxt}...</span>${actualTxt.replace(/\n/g, '<br>')}`;
        } else {
            m.innerText = text;
        }

        if (type === 'ai') {
            const b = document.createElement('button');
            b.className = 'copy-btn';
            b.innerText = 'COPY_OUTPUT';
            b.onclick = () => {
                navigator.clipboard.writeText(text);
                b.innerText = 'COPIED_TO_CLIPBOARD';
                setTimeout(() => b.innerText = 'COPY_OUTPUT', 1000);
            };
            m.appendChild(b);
        }

        win.appendChild(m);
        win.scrollTop = win.scrollHeight;
    }
</script>

</body>
</html>
